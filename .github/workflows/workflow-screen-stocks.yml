# Project             :   Screenipy (fork)
# Description         :   Manually-triggered workflow to screen one or more stock
#                         codes from the GitHub UI and download the results.
#
# How to use:
#   1. Open the "Actions" tab of your fork on GitHub.
#   2. Select "Screenipy - Screen Stocks (Manual)".
#   3. Click "Run workflow", type your comma-separated stock codes
#      (e.g. SBIN,INFY,TCS), pick a screening criteria, and run.
#   4. When it finishes, download the results from the run's "Artifacts".

name: Screenipy - Screen Stocks (Manual)

on:
  workflow_dispatch:
    inputs:
      stocks:
        description: 'Codes (comma-separated). NSE: SBIN,INFY. A-share auto-detected: 600519,000001. Or force a suffix: 600519.SS,AAPL'
        required: true
        default: 'SBIN,INFY,TCS'
      criteria:
        description: 'Screening criteria'
        required: true
        default: '0 - Full Screening (all technicals)'
        type: choice
        options:
          - '0 - Full Screening (all technicals)'
          - '1 - Breakout or Consolidation'
          - '2 - Recent Breakout & Volume'
          - '3 - Consolidating stocks'
      output_format:
        description: 'Result file format'
        required: true
        default: 'xlsx'
        type: choice
        options:
          - 'xlsx'
          - 'csv'
      min_price:
        description: 'Min price filter (A-share CNY suggested: 2)'
        required: true
        default: '2.0'
      max_price:
        description: 'Max price filter (A-share CNY suggested: 3000)'
        required: true
        default: '3000.0'
      volume_ratio:
        description: 'Volume-spike ratio for breakout (A-share suggested: 1.5)'
        required: true
        default: '1.5'
      consolidation_pct:
        description: 'Consolidation range %% (A-share suggested: 15)'
        required: true
        default: '15'
      days_to_lookback:
        description: 'Days to look back for breakout/consolidation'
        required: true
        default: '30'
      only_stage_two:
        description: 'Only Stage-2 (uptrend) stocks?'
        required: true
        default: 'n'
        type: choice
        options:
          - 'n'
          - 'y'

jobs:

  Screen_Stocks:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11.6
      uses: actions/setup-python@v6
      with:
        python-version: 3.11.6

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # These two have conflicting numpy pins, so install without deps (as per Dockerfile/CI).
        pip install --no-deps advanced-ta
        pip install --no-deps pandas-ta-remake

    - name: Write screening config from inputs
      run: |
        # screenipy.py reads screenipy.ini from the working directory (repo root).
        # Generate it from the workflow inputs so thresholds are configurable per-run.
        cat > screenipy.ini <<EOF
        [config]
        period = 300d
        daystolookback = ${{ github.event.inputs.days_to_lookback }}
        duration = 1d
        minprice = ${{ github.event.inputs.min_price }}
        maxprice = ${{ github.event.inputs.max_price }}
        volumeratio = ${{ github.event.inputs.volume_ratio }}
        consolidationpercentage = ${{ github.event.inputs.consolidation_pct }}
        shuffle = y
        cachestockdata = y
        onlystagetwostocks = ${{ github.event.inputs.only_stage_two }}
        useema = n
        EOF
        echo "----- screenipy.ini -----"
        cat screenipy.ini

    - name: Screen Stocks
      run: |
        # Extract the leading number from the criteria choice (e.g. "2 - ..." -> "2").
        CRITERIA_NUM=$(echo "${{ github.event.inputs.criteria }}" | cut -d' ' -f1)
        OUTPUT_FILE="screenipy-result.${{ github.event.inputs.output_format }}"
        echo "Screening: ${{ github.event.inputs.stocks }}"
        echo "Criteria : $CRITERIA_NUM"
        echo "Output   : $OUTPUT_FILE"
        python src/screenipy.py \
          --stocks "${{ github.event.inputs.stocks }}" \
          --criteria "$CRITERIA_NUM" \
          --output "$OUTPUT_FILE"

    - name: Upload Results
      uses: actions/upload-artifact@v6
      with:
        name: screenipy-results
        path: |
          screenipy-result.xlsx
          screenipy-result.csv
        if-no-files-found: warn
        retention-days: 30
