# Temporary diagnostic: does a LIVE yfinance fetch work on the Actions runner
# for an A-share ticker vs an NSE ticker? Prints row counts and any errors.
name: DIAG - yfinance live fetch

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11.6'
    - name: Install yfinance
      run: pip install yfinance==0.2.61
    - name: Probe tickers
      run: |
        python - <<'PY'
        import yfinance as yf
        for t in ["SBIN.NS", "600519.SS", "000001.SZ", "AAPL"]:
            try:
                df = yf.download(t, period="1mo", interval="1d", progress=False, timeout=20, auto_adjust=False)
                print(f"{t}: rows={0 if df is None else len(df)}")
            except Exception as e:
                print(f"{t}: ERROR {type(e).__name__}: {e}")
        PY
